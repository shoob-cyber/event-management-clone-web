version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: event-booking-db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: event-agency-db
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./booking-backend
      dockerfile: Dockerfile
    container_name: event-booking-backend
    ports:
      - "3000:3000"
    environment:
      MONGO_URI: mongodb://mongodb:27017/event-agency-db
      PORT: 3000
      NODE_ENV: production
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./booking-backend:/app
      - /app/node_modules
    command: npm start

  frontend:
    build:
      context: ./booking-frontend
      dockerfile: Dockerfile
    container_name: event-booking-frontend
    ports:
      - "3001:3000"
    environment:
      REACT_APP_API_URL: http://localhost:3000
    depends_on:
      - backend
    volumes:
      - ./booking-frontend:/app
      - /app/node_modules

volumes:
  mongodb_data:

networks:
  default:
    name: event-booking-network
